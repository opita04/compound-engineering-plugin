name: Candidate Validation
run-name: Validate CE candidate ${{ inputs.candidate_sha }} request ${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact candidate commit in the disabled-Actions staging repository
        required: true
        type: string
      base_sha:
        description: Exact trusted fork-main commit used to build the candidate
        required: true
        type: string
      request_id:
        description: Unique worker-generated dispatch correlation ID
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ce-candidate-${{ inputs.candidate_sha }}-${{ inputs.request_id }}
  cancel-in-progress: false

env:
  SANDBOX_ROOT: /tmp/ce-validation

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Validate immutable inputs
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BASE_SHA: ${{ inputs.base_sha }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: |
          set -euo pipefail
          for value in "$CANDIDATE_SHA" "$BASE_SHA"; do
            if [[ ! "$value" =~ ^[0-9a-f]{40}$ ]]; then
              echo "candidate_sha and base_sha must be full lowercase commit SHAs" >&2
              exit 2
            fi
          done
          if [[ ! "$REQUEST_ID" =~ ^[0-9a-f]{32}$ ]]; then
            echo "request_id must be 32 lowercase hexadecimal characters" >&2
            exit 2
          fi
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_SHA}" = "$BASE_SHA"

      - name: Check out trusted policy revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.base_sha }}
          fetch-depth: 0
          persist-credentials: false
          path: trusted

      - name: Check out candidate transport
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: opita04/compound-engineering-candidates
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 0
          persist-credentials: false
          path: candidate

      - name: Enforce provenance and privileged-surface policy
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          BASE_SHA: ${{ inputs.base_sha }}
        run: |
          set -euo pipefail
          test "$(git -C trusted rev-parse HEAD)" = "$BASE_SHA"
          test "$(git -C candidate rev-parse HEAD)" = "$CANDIDATE_SHA"
          git -C candidate merge-base --is-ancestor "$BASE_SHA" "$CANDIDATE_SHA"
          privileged="$(git -C candidate diff --name-only "$BASE_SHA..$CANDIDATE_SHA" -- .github)"
          if [[ -n "$privileged" ]]; then
            echo "candidate changes privileged GitHub automation:" >&2
            printf '%s\n' "$privileged" >&2
            exit 1
          fi

      - name: Install pinned Bun runtime
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Prepare isolated unprivileged workspace
        run: |
          set -euo pipefail
          sudo useradd --uid 2000 --no-create-home --home-dir /nonexistent --shell /usr/sbin/nologin ce-validator
          sudo install -o root -g root -m 0755 "$(readlink -f "$(command -v bun)")" /usr/local/bin/bun
          sudo install -d -o root -g root -m 0711 "$SANDBOX_ROOT"
          sudo cp -a candidate "$SANDBOX_ROOT/candidate"
          sudo install -d -o 2000 -g 2000 -m 0700 \
            "$SANDBOX_ROOT/home" "$SANDBOX_ROOT/tmp" "$SANDBOX_ROOT/output"
          sudo chown -R --no-dereference 2000:2000 "$SANDBOX_ROOT/candidate"

      - name: Install locked dependencies without lifecycle scripts
        run: |
          set -euo pipefail
          sudo -u '#2000' /usr/bin/env -i \
            CI=1 NO_COLOR=1 \
            HOME="$SANDBOX_ROOT/home" TMPDIR="$SANDBOX_ROOT/tmp" \
            PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" \
            /usr/local/bin/bun install --cwd "$SANDBOX_ROOT/candidate" --frozen-lockfile --ignore-scripts

      - name: Execute candidate as isolated UID with loopback-only networking
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ce-sandbox-runner" <<'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          /usr/sbin/ip link set lo up
          exec /usr/bin/setpriv \
            --reuid=2000 --regid=2000 --clear-groups \
            --no-new-privs --inh-caps=-all --ambient-caps=-all --bounding-set=-all \
            /usr/bin/env -i \
              CI=1 NO_COLOR=1 \
              HOME="$CE_HOME" TMPDIR="$CE_TMP" PATH="$CE_PATH" \
              CANDIDATE="$CANDIDATE" OUTPUT="$OUTPUT" \
              /bin/bash -ceu '
                cd "$CANDIDATE"
                bun run release:validate
                bun test \
                  tests/compound-support-files.test.ts \
                  tests/skills/unified-plan-artifact-contract.test.ts \
                  tests/review-skill-contract.test.ts
                set +e
                bun test --reporter=junit --reporter-outfile="$OUTPUT/full-suite.xml" 2>&1 | tee "$OUTPUT/full-suite.log"
                status=${PIPESTATUS[0]}
                set -e
                printf "%s\n" "$status" > "$OUTPUT/full-suite.exit"
              '
          SCRIPT
          chmod 700 "$RUNNER_TEMP/ce-sandbox-runner"
          node_bin="$(dirname "$(command -v node)")"
          sudo /usr/bin/env \
            CE_HOME="$SANDBOX_ROOT/home" CE_TMP="$SANDBOX_ROOT/tmp" \
            CE_PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$node_bin" CANDIDATE="$SANDBOX_ROOT/candidate" OUTPUT="$SANDBOX_ROOT/output" \
            /usr/bin/unshare --net --pid --mount-proc --fork --kill-child \
            "$RUNNER_TEMP/ce-sandbox-runner"

      - name: Validate and reclaim candidate output
        run: |
          set -euo pipefail
          for name in full-suite.xml full-suite.log full-suite.exit; do
            path="$SANDBOX_ROOT/output/$name"
            sudo test -f "$path"
            sudo test ! -L "$path"
            size="$(sudo stat -c %s "$path")"
            if (( size > 52428800 )); then
              echo "candidate output exceeds 50 MiB: $name" >&2
              exit 1
            fi
            sudo chown --no-dereference "$(id -u):$(id -g)" "$path"
          done
          sudo chown "$(id -u):$(id -g)" "$SANDBOX_ROOT/output"
          sudo chmod 700 "$SANDBOX_ROOT/output"

      - name: Enforce trusted structural result policy
        run: >-
          /usr/bin/python3 -I -S
          trusted/.github/validation/validate_candidate_results.py
          "$SANDBOX_ROOT/output"

      - name: Confirm candidate and trusted policy were not mutated
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          set -euo pipefail
          test -z "$(git -C trusted status --porcelain=v1 --untracked-files=all)"
          test -z "$(git -C candidate status --porcelain=v1 --untracked-files=no)"
          test -z "$(sudo -u '#2000' git -C "$SANDBOX_ROOT/candidate" status --porcelain=v1 --untracked-files=no)"
          test "$(sudo -u '#2000' git -C "$SANDBOX_ROOT/candidate" rev-parse HEAD)" = "$CANDIDATE_SHA"

      - name: Remove disposable sandbox
        if: always()
        run: sudo rm -rf -- "$SANDBOX_ROOT"
